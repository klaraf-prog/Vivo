<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vivo · Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:  #F5A623;
      --amber-light: #FFF3DC;
      --bg:     #F7F5F2;
      --card:   #FFFFFF;
      --text:   #1A1612;
      --muted:  #8A8078;
      --border: #EDE8E0;
      --pink:   #E8534A;
      --green:  #2E9E6B;
      --blue:   #3B82F6;
      --purple: #8B5CF6;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card); border-radius: 20px;
      padding: 48px 40px; width: 100%; max-width: 380px;
      box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 20px;
    }
    .login-logo {
      font-family: Georgia, serif; font-size: 2rem; font-weight: 700;
      letter-spacing: -.5px; text-align: center; color: var(--amber);
    }
    .login-box h2 {
      font-size: 1.125rem; font-weight: 600; text-align: center;
      color: var(--muted);
    }
    .login-box input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      border: 1.5px solid var(--border); font-size: 1rem;
      background: var(--bg); outline: none;
      transition: border-color .15s;
    }
    .login-box input:focus { border-color: var(--amber); }
    .login-box button {
      width: 100%; padding: 13px; border-radius: 12px;
      background: var(--amber); border: none; color: #fff;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .login-box button:hover { opacity: .9; }
    .login-error {
      font-size: .875rem; color: var(--pink); text-align: center;
      display: none;
    }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .top-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; position: sticky; top: 0; z-index: 10;
    }
    .top-bar-logo {
      font-family: Georgia, serif; font-size: 1.25rem; font-weight: 700;
      color: var(--amber); letter-spacing: -.3px;
    }
    .top-bar-right { display: flex; align-items: center; gap: 16px; }
    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: .875rem; font-weight: 500; cursor: pointer;
      color: var(--text); transition: border-color .15s;
    }
    .refresh-btn:hover { border-color: var(--amber); }
    .refresh-btn svg { transition: transform .4s; }
    .refresh-btn.spinning svg { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logout-btn {
      padding: 7px 14px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--card);
      font-size: .875rem; font-weight: 500; cursor: pointer;
      color: var(--muted);
    }
    .logout-btn:hover { color: var(--pink); border-color: var(--pink); }
    .last-updated {
      font-size: .8125rem; color: var(--muted);
    }

    .page-content {
      max-width: 1100px; margin: 0 auto;
      padding: 32px 24px 60px;
    }
    .page-title {
      font-size: 1.5rem; font-weight: 700; margin-bottom: 24px;
    }

    /* ── METRIC CARDS ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .metric-card {
      background: var(--card); border-radius: 16px;
      padding: 22px 24px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; gap: 6px;
    }
    .metric-icon {
      font-size: 1.5rem; margin-bottom: 4px;
    }
    .metric-value {
      font-size: 2.25rem; font-weight: 700; letter-spacing: -.5px;
      line-height: 1;
    }
    .metric-label {
      font-size: .875rem; color: var(--muted); font-weight: 500;
    }
    .metric-sub {
      font-size: .8125rem; color: var(--muted); margin-top: 2px;
    }
    .metric-card.amber .metric-value { color: var(--amber); }
    .metric-card.green .metric-value { color: var(--green); }
    .metric-card.blue  .metric-value { color: var(--blue);  }
    .metric-card.purple .metric-value { color: var(--purple); }
    .metric-card.pink  .metric-value { color: var(--pink);  }

    /* ── RSVP BREAKDOWN ── */
    .rsvp-breakdown {
      background: var(--card); border-radius: 16px;
      padding: 22px 24px; box-shadow: var(--shadow);
      margin-bottom: 32px;
    }
    .rsvp-breakdown h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: 16px;
    }
    .rsvp-bars { display: flex; flex-direction: column; gap: 10px; }
    .rsvp-bar-row {
      display: flex; align-items: center; gap: 12px;
    }
    .rsvp-bar-label {
      font-size: .875rem; width: 80px; flex-shrink: 0;
    }
    .rsvp-bar-track {
      flex: 1; height: 10px; border-radius: 99px;
      background: var(--bg); overflow: hidden;
    }
    .rsvp-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width .6s ease;
    }
    .rsvp-bar-fill.dabei     { background: var(--green); }
    .rsvp-bar-fill.vielleicht{ background: var(--amber); }
    .rsvp-bar-fill.nein      { background: var(--pink);  }
    .rsvp-bar-count {
      font-size: .875rem; font-weight: 600; width: 40px;
      text-align: right; flex-shrink: 0;
    }

    /* ── TABLES ── */
    .section-card {
      background: var(--card); border-radius: 16px;
      padding: 22px 24px; box-shadow: var(--shadow);
      margin-bottom: 24px;
    }
    .section-card h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: 16px;
    }
    table {
      width: 100%; border-collapse: collapse;
    }
    th {
      text-align: left; font-size: .8125rem; font-weight: 600;
      color: var(--muted); padding: 0 12px 10px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px; font-size: .9375rem;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }
    .rank { font-weight: 700; color: var(--muted); font-size: .875rem; }
    .pill-sm {
      display: inline-block; font-size: .75rem; font-weight: 600;
      padding: 2px 8px; border-radius: 50px;
    }
    .pill-sm.dabei      { background: #D1FAE5; color: var(--green); }
    .pill-sm.vielleicht { background: var(--amber-light); color: #9a6000; }
    .pill-sm.nein       { background: #FEE2E2; color: var(--pink); }

    /* ── LOADING / SPINNER ── */
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--amber);
      animation: spin .7s linear infinite;
      margin: 40px auto;
    }
    .loading-state { text-align: center; padding: 40px; color: var(--muted); }

    @media (max-width: 600px) {
      .top-bar { padding: 0 16px; }
      .page-content { padding: 20px 16px 60px; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .last-updated { display: none; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">vivo</div>
    <h2>Admin Dashboard</h2>
    <input type="password" id="pw-input" placeholder="Passwort"
      onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Anmelden</button>
    <p class="login-error" id="login-error">Falsches Passwort.</p>
  </div>
</div>

<!-- ══════════════════ DASHBOARD ══════════════════ -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-bar-logo">vivo admin</div>
    <div class="top-bar-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadMetrics()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
        Aktualisieren
      </button>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>
  </div>

  <div class="page-content">
    <div class="page-title">Übersicht</div>

    <!-- Metric cards -->
    <div class="metrics-grid">
      <div class="metric-card amber">
        <div class="metric-icon">👤</div>
        <div class="metric-value" id="m-total-users"><div class="spinner" style="width:24px;height:24px;margin:0"></div></div>
        <div class="metric-label">Nutzer gesamt</div>
      </div>
      <div class="metric-card green">
        <div class="metric-icon">🆕</div>
        <div class="metric-value" id="m-new-users">—</div>
        <div class="metric-label">Neue Nutzer (7 Tage)</div>
        <div class="metric-sub" id="m-new-users-sub"></div>
      </div>
      <div class="metric-card blue">
        <div class="metric-icon">🎉</div>
        <div class="metric-value" id="m-total-events">—</div>
        <div class="metric-label">Events gesamt</div>
        <div class="metric-sub" id="m-events-sub"></div>
      </div>
      <div class="metric-card purple">
        <div class="metric-icon">✅</div>
        <div class="metric-value" id="m-total-rsvps">—</div>
        <div class="metric-label">RSVPs gesamt</div>
      </div>
      <div class="metric-card pink">
        <div class="metric-icon">📅</div>
        <div class="metric-value" id="m-active-events">—</div>
        <div class="metric-label">Aktive Events</div>
        <div class="metric-sub">in der Zukunft</div>
      </div>
    </div>

    <!-- RSVP breakdown -->
    <div class="rsvp-breakdown">
      <h3>RSVP-Aufteilung</h3>
      <div class="rsvp-bars">
        <div class="rsvp-bar-row">
          <span class="rsvp-bar-label">✅ Dabei</span>
          <div class="rsvp-bar-track"><div class="rsvp-bar-fill dabei" id="bar-dabei" style="width:0%"></div></div>
          <span class="rsvp-bar-count" id="cnt-dabei">—</span>
        </div>
        <div class="rsvp-bar-row">
          <span class="rsvp-bar-label">🤔 Vielleicht</span>
          <div class="rsvp-bar-track"><div class="rsvp-bar-fill vielleicht" id="bar-vielleicht" style="width:0%"></div></div>
          <span class="rsvp-bar-count" id="cnt-vielleicht">—</span>
        </div>
        <div class="rsvp-bar-row">
          <span class="rsvp-bar-label">❌ Abgesagt</span>
          <div class="rsvp-bar-track"><div class="rsvp-bar-fill nein" id="bar-nein" style="width:0%"></div></div>
          <span class="rsvp-bar-count" id="cnt-nein">—</span>
        </div>
      </div>
    </div>

    <!-- Most active events -->
    <div class="section-card">
      <h3>🔥 Aktivste Events (nach RSVPs)</h3>
      <div id="active-events-container">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Recent events -->
    <div class="section-card">
      <h3>🆕 Zuletzt erstellte Events</h3>
      <div id="recent-events-container">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Recent users -->
    <div class="section-card">
      <h3>👤 Nutzer</h3>
      <div id="users-container">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Change ADMIN_PASSWORD to set your own password.
const ADMIN_PASSWORD = 'vivo2024';

const firebaseConfig = {
  apiKey:            "AIzaSyAuapMaw8Tpw0HC_TlMUvCbw0PPfWOaL-Y",
  authDomain:        "vivo-mvp.firebaseapp.com",
  databaseURL:       "https://vivo-mvp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "vivo-mvp",
  storageBucket:     "vivo-mvp.firebasestorage.app",
  messagingSenderId: "662578995457",
  appId:             "1:662578995457:web:ee580f001d212cd73d7b00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function checkPassword() {
  const input = document.getElementById('pw-input').value;
  if (input === ADMIN_PASSWORD) {
    sessionStorage.setItem('vivo_admin', '1');
    showDashboard();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => { err.style.display = 'none'; }, 3000);
  }
}

function logout() {
  sessionStorage.removeItem('vivo_admin');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadMetrics();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function fmtDateEvent(dateStr) {
  if (!dateStr) return '—';
  const [y, m, d] = dateStr.split('-');
  return `${d}.${m}.${y}`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isEventPast(ev) {
  if (!ev.date) return false;
  return new Date(ev.date + 'T' + (ev.time || '23:59') + ':00') < new Date();
}

// ─── METRICS ──────────────────────────────────────────────────────────────────
async function loadMetrics() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;

    const [usersSnap, eventsSnap] = await Promise.all([
      db.ref('users').once('value'),
      db.ref('events').once('value'),
    ]);

    // ── USERS ────────────────────────────────────────────────────────────────
    const usersVal = usersSnap.val() || {};
    const userList = Object.entries(usersVal).map(([uid, u]) => ({ uid, ...u }));
    const totalUsers = userList.length;

    // New users this week (if createdAt stored)
    const newUsers = userList.filter(u => u.createdAt && u.createdAt >= weekAgo).length;
    const hasCreatedAt = userList.some(u => u.createdAt);

    set('m-total-users', totalUsers);
    set('m-new-users', hasCreatedAt ? newUsers : '—');
    set('m-new-users-sub', hasCreatedAt ? '' : 'Kein createdAt gespeichert');

    // ── FRIENDSHIPS ──────────────────────────────────────────────────────────

    // ── EVENTS ───────────────────────────────────────────────────────────────
    const eventsVal = eventsSnap.val() || {};
    const eventList = Object.entries(eventsVal).map(([id, ev]) => ({ id, ...ev }));
    const totalEvents = eventList.length;
    const eventsThisWeek = eventList.filter(ev => ev.createdAt && ev.createdAt >= weekAgo).length;
    const activeEvents = eventList.filter(ev => !isEventPast(ev)).length;

    set('m-total-events', totalEvents);
    set('m-events-sub', eventsThisWeek + ' diese Woche erstellt');
    set('m-active-events', activeEvents);

    // ── RSVPS ────────────────────────────────────────────────────────────────
    let totalRsvps = 0, dabeiCnt = 0, vielleichtCnt = 0, neinCnt = 0;
    eventList.forEach(ev => {
      if (ev.rsvps) {
        Object.values(ev.rsvps).forEach(r => {
          totalRsvps++;
          if (r.status === 'dabei')       dabeiCnt++;
          else if (r.status === 'vielleicht') vielleichtCnt++;
          else if (r.status === 'nein')   neinCnt++;
        });
      }
    });
    set('m-total-rsvps', totalRsvps);

    // RSVP bars
    const maxBar = Math.max(dabeiCnt, vielleichtCnt, neinCnt, 1);
    setBar('bar-dabei',      dabeiCnt,      maxBar);
    setBar('bar-vielleicht', vielleichtCnt, maxBar);
    setBar('bar-nein',       neinCnt,       maxBar);
    set('cnt-dabei',      dabeiCnt);
    set('cnt-vielleicht', vielleichtCnt);
    set('cnt-nein',       neinCnt);

    // ── ACTIVE EVENTS TABLE ───────────────────────────────────────────────────
    const byRsvps = [...eventList]
      .map(ev => ({ ...ev, rsvpCount: ev.rsvps ? Object.keys(ev.rsvps).length : 0 }))
      .sort((a, b) => b.rsvpCount - a.rsvpCount)
      .slice(0, 10);

    document.getElementById('active-events-container').innerHTML = byRsvps.length
      ? `<table>
          <thead><tr>
            <th>#</th><th>Event</th><th>Datum</th><th>Ersteller</th>
            <th>Dabei</th><th>Vielleicht</th><th>Abgesagt</th><th>Gesamt</th>
          </tr></thead>
          <tbody>${byRsvps.map((ev, i) => {
            const rsvps = ev.rsvps ? Object.values(ev.rsvps) : [];
            const d  = rsvps.filter(r => r.status === 'dabei').length;
            const vl = rsvps.filter(r => r.status === 'vielleicht').length;
            const n  = rsvps.filter(r => r.status === 'nein').length;
            const past = isEventPast(ev);
            return `<tr>
              <td><span class="rank">${i + 1}</span></td>
              <td><strong>${esc(ev.emoji || '🎉')} ${esc(ev.title)}</strong>${past ? ' <span style="font-size:.75rem;color:var(--muted)">(vergangen)</span>' : ''}</td>
              <td style="color:var(--muted);font-size:.875rem">${fmtDateEvent(ev.date)}</td>
              <td style="color:var(--muted);font-size:.875rem">${esc(ev.creatorName || '—')}</td>
              <td><span class="pill-sm dabei">${d}</span></td>
              <td><span class="pill-sm vielleicht">${vl}</span></td>
              <td><span class="pill-sm nein">${n}</span></td>
              <td><strong>${ev.rsvpCount}</strong></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`
      : '<p style="color:var(--muted);padding:12px 0">Keine Events gefunden.</p>';

    // ── RECENT EVENTS TABLE ───────────────────────────────────────────────────
    const recentEvents = [...eventList]
      .filter(ev => ev.createdAt)
      .sort((a, b) => b.createdAt - a.createdAt)
      .slice(0, 10);

    document.getElementById('recent-events-container').innerHTML = recentEvents.length
      ? `<table>
          <thead><tr>
            <th>Event</th><th>Datum</th><th>Ersteller</th><th>Erstellt am</th><th>RSVPs</th>
          </tr></thead>
          <tbody>${recentEvents.map(ev => {
            const rsvpCount = ev.rsvps ? Object.keys(ev.rsvps).length : 0;
            return `<tr>
              <td><strong>${esc(ev.emoji || '🎉')} ${esc(ev.title)}</strong></td>
              <td style="color:var(--muted);font-size:.875rem">${fmtDateEvent(ev.date)}</td>
              <td style="color:var(--muted);font-size:.875rem">${esc(ev.creatorName || '—')}</td>
              <td style="color:var(--muted);font-size:.875rem">${fmtDate(ev.createdAt)}</td>
              <td><strong>${rsvpCount}</strong></td>
            </tr>`;
          }).join('')}</tbody>
        </table>`
      : '<p style="color:var(--muted);padding:12px 0">Keine Events mit Zeitstempel gefunden.</p>';

    // ── USERS TABLE ───────────────────────────────────────────────────────────
    const sortedUsers = [...userList]
      .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

    document.getElementById('users-container').innerHTML = sortedUsers.length
      ? `<table>
          <thead><tr>
            <th>Name</th><th>@Username</th><th>Standort</th><th>Registriert</th>
          </tr></thead>
          <tbody>${sortedUsers.map(u => `<tr>
            <td><strong>${esc(u.displayName || '—')}</strong></td>
            <td style="color:var(--muted);font-size:.875rem">${u.username ? '@' + esc(u.username) : '—'}</td>
            <td style="color:var(--muted);font-size:.875rem">${esc(u.location || '—')}</td>
            <td style="color:var(--muted);font-size:.875rem">${u.createdAt ? fmtDate(u.createdAt) : '—'}</td>
          </tr>`).join('')}</tbody>
        </table>`
      : '<p style="color:var(--muted);padding:12px 0">Keine Nutzer gefunden.</p>';

    // Last updated
    document.getElementById('last-updated').textContent =
      'Zuletzt aktualisiert: ' + new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

  } catch (err) {
    console.error('loadMetrics:', err);
    alert('Fehler beim Laden der Daten: ' + err.message);
  }

  btn.classList.remove('spinning');
}

function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function setBar(id, count, max) {
  const el = document.getElementById(id);
  if (el) el.style.width = Math.round((count / max) * 100) + '%';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (sessionStorage.getItem('vivo_admin') === '1') {
  showDashboard();
}
</script>
</body>
</html>
